services:
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    image: moneyrobert-pro-backend:latest
    container_name: moneyrobert-pro-backend
    restart: always
    expose:
      - "8001"
    environment:
      - APP_SERVER__HOST=0.0.0.0
      - APP_SERVER__PORT=8001
      - APP_SERVER__DEBUG=false
      - APP_SERVER__ENVIRONMENT=production
      - APP_DATABASE__URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-moneyrobert}
      - APP_DATABASE__POOL_SIZE=10
      - APP_REDIS__URL=redis://redis:6379/0
      - APP_SECURITY__SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - APP_SECURITY__ALGORITHM=HS256
      - APP_SECURITY__ACCESS_TOKEN_EXPIRE_MINUTES=30
      - APP_SECURITY__REFRESH_TOKEN_EXPIRE_DAYS=7
      - APP_CORS__ORIGINS=[]
      - APP_CORS__ALLOW_CREDENTIALS=true
      - APP_RATE_LIMIT__ENABLED=true
      - APP_RATE_LIMIT__REQUESTS_PER_MINUTE=100
      - APP_RATE_LIMIT__REQUESTS_PER_HOUR=1000
      - NEWS_FETCH_INTERVAL_MINUTES=${NEWS_FETCH_INTERVAL_MINUTES:-15}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - moneyrobert-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        - VITE_API_URL=/api/v1
    image: moneyrobert-pro-frontend:latest
    container_name: moneyrobert-pro-frontend
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - moneyrobert-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db:
    image: pgvector/pgvector:pg15
    container_name: moneyrobert-pro-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-moneyrobert}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moneyrobert-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: moneyrobert-pro-redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - moneyrobert-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  moneyrobert-network:
    driver: bridge
